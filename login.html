<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in | sl-Dubbing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── ElevenLabs Clone Styling ── */
:root {
  --bg-color: #ffffff;
  --text-main: #111827;
  --text-muted: #6b7280;
  --border-color: #e5e7eb;
  --border-focus: #111827;
  --btn-grey: #a1a1aa; /* اللون الرمادي لزر ElevenLabs */
  --btn-grey-hover: #71717a;
  --radius: 10px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.login-container {
  width: 100%;
  max-width: 400px;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  margin-top: 4vh;
}

/* ── Logo ── */
.logo {
  text-align: center;
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 60px;
  color: var(--text-main);
  text-decoration: none;
}
.logo span {
  font-weight: 900;
  margin-right: 2px;
}

/* ── Heading ── */
.title {
  text-align: center;
  font-size: 1.75rem;
  font-weight: 700;
  margin-bottom: 40px;
  letter-spacing: -0.02em;
}

/* ── OAuth Buttons ── */
.oauth-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 30px;
}

.oauth-btn {
  width: 100%;
  height: 48px;
  background: #fff;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-main);
  cursor: pointer;
  transition: background 0.2s;
}

.oauth-btn:hover {
  background: #f9fafb;
}

.oauth-btn svg {
  width: 18px;
  height: 18px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background-color: var(--border-color);
  margin-bottom: 30px;
}

/* ── Form ── */
.form-group {
  margin-bottom: 20px;
}

.label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

label {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-main);
}

.forgot-link {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
}

.forgot-link:hover {
  color: var(--text-main);
  text-decoration: underline;
}

.input-wrap {
  position: relative;
}

input[type="email"],
input[type="password"] {
  width: 100%;
  height: 48px;
  padding: 0 16px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: var(--border-focus);
}

.toggle-pwd {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.1rem;
}

.toggle-pwd:hover {
  color: var(--text-main);
}

/* ── Submit Button ── */
.submit-btn {
  width: 100%;
  height: 48px;
  background-color: var(--btn-grey);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.2s;
}

.submit-btn:hover {
  background-color: var(--btn-grey-hover);
}

/* ── Footer ── */
.footer-text {
  text-align: center;
  margin-top: 24px;
  font-size: 0.9rem;
  color: var(--text-main);
}

.footer-text a {
  color: var(--text-main);
  font-weight: 600;
  text-decoration: none;
}

.footer-text a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="login-container">
  
  <a href="index.html" class="logo"><span>||</span>sl-Dubbing</a>

  <h1 class="title">Welcome back</h1>

  <div class="oauth-group">
    <button class="oauth-btn" id="googleBtn" type="button">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    
    <button class="oauth-btn" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.49.07 2.65.65 3.36 1.76-2.9 1.77-2.39 5.86.48 7.02-.68 1.75-1.61 3.46-2.42 4.19zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.35 2.37-2.02 4.43-3.74 4.25z"/>
      </svg>
      Sign in with Apple
    </button>
    
    <button class="oauth-btn" type="button">
      Sign in with SSO
    </button>
  </div>

  <div class="divider"></div>

  <form id="loginForm">
    <div class="form-group">
      <div class="label-row">
        <label for="email">Email</label>
      </div>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="password">Password</label>
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>
      <div class="input-wrap">
        <input type="password" id="password" required>
        <i class="fas fa-eye toggle-pwd" onclick="togglePassword()"></i>
      </div>
    </div>

    <button type="submit" class="submit-btn">Sign in</button>
  </form>

  <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>

</div>

<script>
// دالة إظهار وإخفاء كلمة المرور
function togglePassword() {
  const pwd = document.getElementById('password');
  const icon = document.querySelector('.toggle-pwd');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    pwd.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

// محاكاة تسجيل الدخول وحفظ البيانات كما فعلنا سابقاً
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  
  // إنشاء مستخدم وهمي للاختبار (سيتم استبداله بربط الباك اند لاحقاً)
  const fakeUser = {
      email: email,
      name: email.split('@')[0],
      avatar: email.charAt(0).toUpperCase(),
      credits: 50000
  };
  
  localStorage.setItem('sl_user', JSON.stringify(fakeUser));
  
  const returnUrl = sessionStorage.getItem('returnUrl') || 'index.html';
  sessionStorage.removeItem('returnUrl');
  window.location.href = returnUrl;
});

// محاكاة زر جوجل
document.getElementById('googleBtn').addEventListener('click', function() {
  const fakeUser = {
      email: "engineer@sl-dubbing.com",
      name: "Engineer",
      avatar: "E",
      credits: 50000
  };
  localStorage.setItem('sl_user', JSON.stringify(fakeUser));
  window.location.href = 'index.html';
});
</script>

</body>
</html>
