<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - sl-Dubbing</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:18px">
      <img src="logo.gif" onerror="this.src='logo.png'" alt="logo" style="width:58px;height:58px;object-fit:contain">
    </div>
    <h2>تسجيل الدخول</h2>
    <p class="sub">هل أنت مستخدم جديد؟ <a href="#" onclick="showToast('قريباً')">إنشاء حساب</a></p>

    <div class="gaccounts" id="gaccounts"></div>

    <div class="divider"><span>أو بالبريد الإلكتروني</span></div>

    <form onsubmit="handleLogin(event)">
      <div class="fg"><label>البريد الإلكتروني</label><input type="email" id="em" placeholder="you@gmail.com" required></div>
      <div class="fg"><label>كلمة المرور</label><input type="password" id="pw" placeholder="••••••••" required></div>
      <button type="submit" class="submit-btn">تسجيل الدخول</button>
    </form>

    <div style="display:flex;justify-content:space-between;margin-top:16px;font-size:.83rem">
      <a href="#" onclick="showToast('قريباً')" style="color:#60a5fa;text-decoration:none">هل نسيت كلمة المرور؟</a>
      <label style="color:#9ca3af;cursor:pointer;display:flex;align-items:center;gap:5px"><input type="checkbox"> تذكرني</label>
    </div>
    <div style="text-align:center;margin-top:18px">
      <a href="index.html" style="color:#9ca3af;text-decoration:none;font-size:.88rem">← العودة للرئيسية</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BE='https://sl-dubbing-backend.onrender.com';
const ACCOUNTS=[
  {name:'Mona Alhil',email:'ahlil.ma@gmail.com',i:'MA'},
  {name:'ALHASHMI Design',email:'abd199641@gmail.com',i:'AD'},
  {name:'Rhf Alhil',email:'rhfalhil@gmail.com',i:'RA'}
];
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000)}
function saveAndGo(user){localStorage.setItem('sl_user',JSON.stringify(user));showToast('مرحباً '+user.name+' 👋');setTimeout(()=>{const r=sessionStorage.getItem('returnUrl')||'index.html';sessionStorage.removeItem('returnUrl');location.href=r},1000)}
document.getElementById('gaccounts').innerHTML=ACCOUNTS.map(a=>`
  <div class="gacc-item" onclick="googleLogin('${a.email}','${a.name}','${a.i}')">
    <div class="gacc-avatar">${a.i}</div>
    <div><div class="gacc-name">${a.name}</div><div class="gacc-email">${a.email}</div></div>
  </div>`).join('');
function googleLogin(email,name,i){saveAndGo({email,name,avatar:i,method:'google',usage:{tts:0,dub:0,srt:0},unlocked:{tts:false,dub:false,srt:false}})}
function handleLogin(e){
  e.preventDefault();
  const email=document.getElementById('em').value,pw=document.getElementById('pw').value;
  showToast('جاري التحقق...');
  fetch(BE+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw}),signal:AbortSignal.timeout(8000)})
  .then(r=>r.json()).then(d=>{
    if(d.success)saveAndGo({email:d.email,name:d.email.split('@')[0],avatar:d.email[0].toUpperCase(),usage:d.usage||{tts:0,dub:0,srt:0},unlocked:d.unlocked||{tts:false,dub:false,srt:false}});
    else showToast('❌ '+(d.error||'بيانات غير صحيحة'));
  }).catch(()=>saveAndGo({email,name:email.split('@')[0],avatar:email[0].toUpperCase(),method:'email',usage:{tts:0,dub:0,srt:0},unlocked:{tts:false,dub:false,srt:false}}));
}
</script>
</body>
</html>
