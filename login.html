<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in | sl-Dubbing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ── ElevenLabs Clone Styling ── */
:root {
  --bg-color: #ffffff;
  --text-main: #111827;
  --text-muted: #6b7280;
  --border-color: #e5e7eb;
  --border-focus: #111827;
  --btn-grey: #a1a1aa;
  --btn-grey-hover: #71717a;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
.login-container { width: 100%; max-width: 400px; padding: 40px 20px; display: flex; flex-direction: column; margin-top: 4vh; }

/* ── Logo ── */
.logo { text-align: center; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 60px; color: var(--text-main); text-decoration: none; }
.logo span { font-weight: 900; margin-right: 2px; }
.title { text-align: center; font-size: 1.75rem; font-weight: 700; margin-bottom: 40px; letter-spacing: -0.02em; }

/* ── OAuth Buttons ── */
.oauth-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
.oauth-btn { width: 100%; height: 48px; background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 0.95rem; font-weight: 500; color: var(--text-main); cursor: pointer; transition: background 0.2s; }
.oauth-btn:hover { background: #f9fafb; }
.oauth-btn svg { width: 18px; height: 18px; }

/* ── Divider ── */
.divider { height: 1px; background-color: var(--border-color); margin-bottom: 30px; }

/* ── Form ── */
.form-group { margin-bottom: 20px; }
.label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
.forgot-link { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; }
.forgot-link:hover { color: var(--text-main); text-decoration: underline; }
.input-wrap { position: relative; }
input[type="email"], input[type="password"] { width: 100%; height: 48px; padding: 0 16px; border: 1px solid var(--border-color); border-radius: var(--radius); font-size: 1rem; outline: none; transition: border-color 0.2s; }
input:focus { border-color: var(--border-focus); }
.toggle-pwd { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
.toggle-pwd:hover { color: var(--text-main); }
.submit-btn { width: 100%; height: 48px; background-color: var(--btn-grey); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
.submit-btn:hover { background-color: var(--btn-grey-hover); }

/* ── Footer ── */
.footer-text { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-main); }
.footer-text a { color: var(--text-main); font-weight: 600; text-decoration: none; }
.footer-text a:hover { text-decoration: underline; }

/* ── حاوية زر جوجل ── */
.google-btn-wrapper { width: 100%; display: flex; justify-content: center; }
</style>
</head>
<body>

<div class="login-container">
  
  <a href="index.html" class="logo"><span>||</span>sl-Dubbing</a>
  <h1 class="title">Welcome back</h1>

  <div class="oauth-group">
    <div class="google-btn-wrapper" id="googleBtn"></div>
    
    <button class="oauth-btn" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.49.07 2.65.65 3.36 1.76-2.9 1.77-2.39 5.86.48 7.02-.68 1.75-1.61 3.46-2.42 4.19zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.35 2.37-2.02 4.43-3.74 4.25z"/></svg>
      Sign in with Apple
    </button>
    <button class="oauth-btn" type="button">Sign in with SSO</button>
  </div>

  <div class="divider"></div>

  <form id="loginForm">
    <div class="form-group">
      <div class="label-row"><label for="email">Email</label></div>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="password">Password</label>
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>
      <div class="input-wrap">
        <input type="password" id="password" required>
        <i class="fas fa-eye toggle-pwd" onclick="togglePassword()"></i>
      </div>
    </div>

    <button type="submit" class="submit-btn">Sign in</button>
  </form>
  <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>

</div>

<script>
// --- كود تهيئة جوجل OAuth ---
const GOOGLE_CLIENT_ID = "497619073475-6vjelufub8gci231ettdhmk5pv0cdde3.apps.googleusercontent.com";
const API_BASE = "https://sl-dubbing-backend-production.up.railway.app";

// 1. تهيئة زر جوجل الرسمي فور تحميل الصفحة
window.onload = function () {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleResponse
  });
  
  // دمج زر جوجل الرسمي ليحل محل الزر الوهمي الخاص بنا بنفس الحجم والشكل
  google.accounts.id.renderButton(
    document.getElementById("googleBtn"),
    { theme: "outline", size: "large", width: document.getElementById("googleBtn").offsetWidth }
  );
};

// 2. دالة استقبال الرد من جوجل وإرساله لسيرفرنا
async function handleGoogleResponse(response) {
  try {
    const res = await fetch(`${API_BASE}/api/auth/google`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // السيرفر تحقق من جوجل بنجاح، نحفظ بياناته محلياً ليعرف الموقع أنه مسجل دخول
      localStorage.setItem('sl_user', JSON.stringify({
          email: data.user.email,
          name: data.user.name,
          avatar: `<img src="${data.user.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`,
          credits: data.user.credits
      }));
      
      const returnUrl = sessionStorage.getItem('returnUrl') || 'index.html';
      sessionStorage.removeItem('returnUrl');
      window.location.href = returnUrl;
    } else {
      alert("فشل التحقق من السيرفر: " + data.error);
    }
  } catch (err) {
    console.error(err);
    alert("حدث خطأ في الاتصال بالسيرفر. تأكد من أن السيرفر يعمل.");
  }
}

// دالة إظهار وإخفاء كلمة المرور للنموذج العادي
function togglePassword() {
  const pwd = document.getElementById('password');
  const icon = document.querySelector('.toggle-pwd');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    pwd.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

// كود تجريبي للنموذج العادي (Email/Password) مؤقتاً
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert("الدخول بالبريد قيد التطوير. يرجى استخدام 'Sign in with Google' حالياً.");
});
</script>

</body>
</html>
