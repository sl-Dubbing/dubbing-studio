<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نطق النصوص - sl-Dubbing</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root{--primary:#7c3aed;--primary-light:#a78bfa;--secondary:#60a5fa;--accent:#34d399;--dark:#0a0a1a;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.08);--text:#e0e0ff;--text-muted:#9ca3af;--text-dim:#6b7280}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a0533 0%,#0a0a1a 50%,#001233 100%);color:var(--text);min-height:100vh}
    .wrap{position:relative;max-width:1200px;margin:0 auto;padding:24px 16px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding:20px 0}
    .logo-header{display:flex;align-items:center;gap:12px;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .logo-header img{width:45px;height:45px;object-fit:contain}
    .user-info{display:flex;align-items:center;gap:12px}
    .login-btn{padding:10px 20px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:10px;color:white;cursor:pointer;font-weight:700;text-decoration:none;font-size:.9rem}
    .logout-btn{padding:8px 16px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#f87171;cursor:pointer;font-weight:600}
    .user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#2563eb);display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
    .tool-header{display:flex;align-items:center;gap:15px;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .tool-header h1{font-size:1.8rem;font-weight:800;color:white}
    .back-btn{padding:10px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:#9ca3af;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s}
    .back-btn:hover{background:rgba(167,139,250,.1);color:white}
    .tool-container{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px}
    .lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px}
    .lang-btn{padding:12px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#c4b5fd;cursor:pointer;transition:all .2s;text-align:center;font-size:.85rem}
    .lang-btn:hover{background:rgba(167,139,250,.15);transform:translateY(-2px)}
    .lang-btn.active{background:linear-gradient(135deg,rgba(167,139,250,.3),rgba(96,165,250,.3));border-color:#a78bfa;color:#fff}
    .lang-flag{font-size:1.2rem;display:block;margin-bottom:4px}
    .text-area{width:100%;min-height:150px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e0e0ff;font-size:1rem;padding:15px;resize:vertical;font-family:inherit;outline:none;margin-bottom:8px}
    .text-area:focus{border-color:#a78bfa}
    .text-area::placeholder{color:#6b7280}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:15px 0 20px}
    .control-group{display:flex;flex-direction:column;gap:8px}
    .control-group label{font-size:.9rem;color:#9ca3af;font-weight:600}
    .control-group input[type=range]{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;-webkit-appearance:none}
    .control-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#60a5fa);cursor:pointer}
    .cv{color:#a78bfa;font-weight:700}
    .action-btn{padding:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:12px;color:white;cursor:pointer;font-weight:700;font-size:1.1rem;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(124,58,237,.4)}
    .action-btn:hover{transform:translateY(-2px)}
    .action-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .progress-wrap{display:none;margin:20px 0}
    .progress-wrap.active{display:block}
    .progress-bar{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#34d399);border-radius:5px;width:0%;transition:width .3s}
    .progress-text{text-align:center;margin-top:10px;color:#a78bfa;font-weight:600}
    audio{width:100%;margin:20px 0;display:none}
    audio.show{display:block}
    .dl-btn{padding:14px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:10px;color:white;font-weight:700;width:100%;display:none;align-items:center;justify-content:center;gap:8px;text-decoration:none}
    .dl-btn.show{display:flex}
    .char-count{color:#6b7280;font-size:.85rem;margin-bottom:15px}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;padding:16px 32px;border-radius:12px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.4);transition:transform .3s;z-index:2000}
    .toast.show{transform:translateX(-50%) translateY(0)}
    footer{text-align:center;padding:40px 0 20px;color:#6b7280;font-size:.85rem;border-top:1px solid rgba(255,255,255,.08);margin-top:60px}
    footer a{color:#9ca3af;text-decoration:none}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo-header" href="index.html">
      <img src="logo.gif" onerror="this.src='logo.png'" alt="logo">
      sl-Dubbing & Translation
    </a>
    <div class="user-info" id="hdr">
      <a href="login.html" class="login-btn">تسجيل الدخول</a>
    </div>
  </header>

  <div class="tool-header">
    <a href="index.html" class="back-btn">← رجوع</a>
    <h1>🎙️ نطق النصوص</h1>
  </div>

  <div class="tool-container">
    <label style="display:block;margin-bottom:10px;font-weight:600">اختر اللغة:</label>
    <div class="lang-grid" id="langs"></div>
    <label style="display:block;margin-bottom:10px;font-weight:600">النص:</label>
    <textarea class="text-area" id="txt" placeholder="اكتب النص هنا..." oninput="document.getElementById('cc').textContent=this.value.length+' حرف'"></textarea>
    <div class="char-count" id="cc">0 حرف</div>
    <div class="controls">
      <div class="control-group"><label>السرعة: <span class="cv" id="rv">1.0x</span></label><input type="range" min=".5" max="2" step=".1" value="1" oninput="document.getElementById('rv').textContent=this.value+'x'" id="rc"></div>
      <div class="control-group"><label>الطبقة: <span class="cv" id="pv">1.0x</span></label><input type="range" min=".5" max="2" step=".1" value="1" oninput="document.getElementById('pv').textContent=this.value+'x'" id="pc"></div>
      <div class="control-group"><label>الصوت: <span class="cv" id="vv">100%</span></label><input type="range" min="0" max="1" step=".1" value="1" oninput="document.getElementById('vv').textContent=Math.round(this.value*100)+'%'" id="vc"></div>
    </div>
    <button class="action-btn" id="speakBtn" onclick="speakText()">▶ نطق النص</button>
    <div class="progress-wrap" id="prog">
      <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
      <div class="progress-text">جاري النطق...</div>
    </div>
    <audio id="aud" controls></audio>
    <a class="dl-btn" id="dl" download="tts.mp3">⬇️ تحميل الصوت</a>
  </div>

  <footer><p>ALHASHMI © 2026</p><p style="margin-top:8px"><a href="privacy.html">سياسة الخصوصية</a></p></footer>
</div>
<div class="toast" id="toast"></div>
<script>
const LANGS=[{code:'ar',name:'العربية',flag:'🇸🇦'},{code:'en',name:'English',flag:'🇺🇸'},{code:'es',name:'Español',flag:'🇪🇸'},{code:'fr',name:'Français',flag:'🇫🇷'},{code:'de',name:'Deutsch',flag:'🇩🇪'},{code:'it',name:'Italiano',flag:'🇮🇹'},{code:'ru',name:'Русский',flag:'🇷🇺'},{code:'tr',name:'Türkçe',flag:'🇹🇷'},{code:'zh',name:'中文',flag:'🇨🇳'},{code:'hi',name:'हिन्दी',flag:'🇮🇳'},{code:'fa',name:'فارسی',flag:'🇮🇷'},{code:'sv',name:'Svenska',flag:'🇸🇪'},{code:'nl',name:'Nederlands',flag:'🇳🇱'}];
let lang='ar';
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000)}
function init(){
  try{const u=JSON.parse(localStorage.getItem('sl_user'));if(u){document.getElementById('hdr').innerHTML=`<div class="user-avatar">${u.avatar||'👤'}</div><span style="color:#9ca3af;font-size:.9rem">${u.name||u.email}</span><button class="logout-btn" onclick="localStorage.removeItem('sl_user');location.href='index.html'">خروج</button>`;}else{sessionStorage.setItem('returnUrl',location.href);location.href='login.html';return;}}catch{location.href='login.html';return;}
  document.getElementById('langs').innerHTML=LANGS.map(l=>`<button class="lang-btn ${l.code==='ar'?'active':''}" onclick="selectLang('${l.code}',this)"><span class="lang-flag">${l.flag}</span><span>${l.name}</span></button>`).join('');
}
function selectLang(c,b){lang=c;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function speakText(){
  const text=document.getElementById('txt').value;
  if(!text){showToast('الرجاء إدخال نص');return;}
  const btn=document.getElementById('speakBtn'),prog=document.getElementById('prog');
  btn.disabled=true;prog.classList.add('active');
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='ar'?'ar-SA':lang+'-'+lang.toUpperCase();
  u.rate=parseFloat(document.getElementById('rc').value);
  u.pitch=parseFloat(document.getElementById('pc').value);
  u.volume=parseFloat(document.getElementById('vc').value);
  let p=0;const iv=setInterval(()=>{p+=10;document.getElementById('pf').style.width=p+'%';if(p>=100){clearInterval(iv);prog.classList.remove('active');btn.disabled=false;speechSynthesis.speak(u);document.getElementById('aud').classList.add('show');document.getElementById('dl').classList.add('show');showToast('✅ تم النطق!')}},200);
}
init();
</script>
</body>
</html>
